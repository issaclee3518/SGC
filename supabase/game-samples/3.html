<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0a2e; touch-action: none; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, tiles = [], selected = null, score = 0;
    const colors = ['#f72585', '#7209b7', '#3a0ca3', '#4361ee', '#4cc9f0'];
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      if (!tiles.length) {
        for (let i = 0; i < 9; i++) tiles.push({ i, c: colors[i % colors.length], matched: false });
      }
    }
    window.addEventListener('resize', resize);
    resize();
    canvas.addEventListener('pointerdown', (e) => {
      const col = 3, size = Math.min(w, h) * 0.25;
      const ox = (w - size * col) / 2, oy = (h - size * col) / 2;
      const tx = Math.floor((e.clientX - ox) / size);
      const ty = Math.floor((e.clientY - oy) / size);
      if (tx < 0 || ty < 0 || tx > 2 || ty > 2) return;
      const idx = ty * 3 + tx;
      const t = tiles[idx];
      if (t.matched) return;
      if (!selected) { selected = t; return; }
      if (selected.c === t.c) { selected.matched = t.matched = true; score++; selected = null; }
      else selected = null;
    });
    function loop() {
      const col = 3, size = Math.min(w, h) * 0.25;
      const ox = (w - size * col) / 2, oy = (h - size * col) / 2;
      ctx.fillStyle = '#1a0a2e';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px system-ui';
      ctx.fillText('퍼즐 스냅 — 같은 색 2개', 16, 36);
      ctx.fillText('점수: ' + score, 16, 64);
      tiles.forEach((t) => {
        if (t.matched) return;
        const x = ox + (t.i % 3) * size, y = oy + Math.floor(t.i / 3) * size;
        ctx.fillStyle = t.c;
        ctx.fillRect(x + 8, y + 8, size - 16, size - 16);
        if (selected === t) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 4;
          ctx.strokeRect(x + 4, y + 4, size - 8, size - 8);
        }
      });
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
