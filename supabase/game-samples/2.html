<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, ground, jumping = false, jumpV = 0, beat = 0;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      ground = h - 80;
    }
    window.addEventListener('resize', resize);
    resize();
    canvas.addEventListener('pointerdown', () => {
      if (!jumping) { jumping = true; jumpV = -16; }
    });
    function loop() {
      beat++;
      if (jumping) {
        jumpV += 0.9;
        ground += jumpV;
        if (ground >= h - 80) { ground = h - 80; jumping = false; jumpV = 0; }
      }
      const pulse = (Math.sin(beat * 0.15) + 1) / 2;
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = `hsl(${200 + pulse * 60}, 80%, 60%)`;
      ctx.fillRect(0, h - 8, w * pulse, 8);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px system-ui';
      ctx.fillText('타이밍 점프', 16, 36);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(w / 2 - 20, ground - 40, 40, 40);
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
